# cship — Claude Code statusline
# Full config reference: https://cship.dev
[cship]
lines = [
  "$directory$git_branch$git_status$python$nodejs$rust",
  "$cship.model    $cship.context_window.used_tokens    $cship.peak_usage    $cship.usage_limits    +$cship.cost.total_lines_added -$cship.cost.total_lines_removed"
]

[cship.model]
symbol = "🤖 "
style  = "bold cyan"

[cship.cost.total_lines_added]
style = "bold green"

[cship.cost.total_lines_removed]
style = "bold red"

[cship.usage_limits]
five_hour_format   = "⌛ 5h {pct}% ({reset})"
seven_day_format   = "📅 7d {pct}% ({reset})"
separator          = " "
warn_threshold     = 60.0
warn_style         = "fg:#e0af68"
critical_threshold = 80.0
critical_style     = "bold fg:#f7768e"
